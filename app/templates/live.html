    <h1>Overlay text on canvas image and save as base64</h1>

function DrawOverlay(img) {
    ctx.drawImage(img, 0, 0);
    ctx.fillStyle = 'transparent';

    // Change the height and width of the overlay
    const overlayWidth = canvas.width * 0.75; // For example, set the width to 75% of canvas width
    const overlayHeight = canvas.height * 0.3; // For example, set the height to 50% of canvas height

    const overlayX = (canvas.width - overlayWidth) / 2; // Calculate X position for centering
    const overlayY = (canvas.height - overlayHeight) / 2; // Calculate Y position for centering

    ctx.fillRect(overlayX, overlayY, overlayWidth, overlayHeight);
}

function DynamicText(img) {
  document.getElementById('name').addEventListener('keyup', function() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    DrawOverlay(img);
    DrawText(); 
    const text_title = this.value;

    // Calculate the width of the text
    const textWidth = ctx.measureText(text_title).width;

    // Calculate the X position for centering the text within the canvas
    const centerX = (canvas.width - textWidth) / 2;

    // Calculate Y position (Assuming the text is 20px in height and you want it vertically centered)
    const centerY = (canvas.height + 20) / 2;

    // Fill text at the calculated position
    ctx.fillText(text_title, centerX, centerY);
  });
}




function handleImage(e) {
    var reader = new FileReader();
    var img = "";
    var src = "";
    reader.onload = function(event) {
        img = new Image();
        img.onload = function() {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img,0,0);
        }
        img.src = event.target.result;
        src = event.target.result;
        canvas.classList.add("show");
        DrawOverlay(img);
        DrawText(); 
        DynamicText(img);   
    }

    reader.readAsDataURL(e.target.files[0]); 
 
}
function convertToImage() {
	window.open(canvas.toDataURL('png'));
}
document.getElementById('download').onclick = function download() {
		convertToImage();
}
