
{% extends 'base.html' %}
{% load static %}



	

		


{% block content %}

<div class="dis-none panel-search w-full p-t-10 p-b-15">
    <form action="{% url 'search' %}" method="GET">
    <div class="bor8 dis-flex p-l-15">
        
        <input class="mtext-107 cl2 size-114 plh2 p-r-15" type="text" name="q" placeholder="Search">
        <button class="size-113 flex-c-m fs-16 cl2 hov-cl1 trans-04" type="submit">
            <i class="zmdi zmdi-search"></i>
        </button>
    </div>	
</form>
</div>

<section>
	<div class="sec-banner bg0 p-t-100 p-b-50">
		<div class="container">
			<h4 class="ltext-102 cl5" style="padding-bottom: 15px; text-align: center;">
				Categories
			</h4>
			<div class="row">
				{% for c in categories %}
				<div class="col-md-6 col-xl-4 p-b-30 m-lr-auto">
				
					<div class="block1 wrap-pic-w">
					
					
							<img src="{{ c.image.url }}" alt="IMG-BANNER" style="height: 250px; object-fit: cover;">
							
						
						<a href="{% url 'shop' %}" class="block1-txt ab-t-l s-full flex-col-l-sb p-lr-38 p-tb-34 trans-03 respon3">
							<div class="block1-txt-child1 flex-col-l">
								

								<span class="block1-info stext-102 trans-04">
								  {{c.version}}

								</span>
							</div>

							<div class="block1-txt-child2 p-b-4 trans-05">
								<div class="block1-link stext-101 cl0 trans-09">
									Shop Now
								</div>
							</div>
						</a>
					</div>
					<span class="block1-name ltext-100 trans-04 p-b-8">
						{{c.title}}
					</span>
				</div>
				{% endfor %}

			

			
			</div>
		</div>
	</div>
</section>


{% endblock %}
